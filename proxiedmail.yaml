openapi: 3.0.0
servers:
  - url: https://proxiedmail.com/
info:
  description: ProxiedMail API — create and manage proxy email addresses that forward incoming mail to your real addresses, with support for webhooks and browsable email history.
  version: 1.0.0
  title: ProxiedMail API
  license:
    name: GPL
    url: https://www.gnu.org/licenses/quick-guide-gplv3.html
paths:
  /api/v1/callback:
    post:
      tags:
        - callback
      summary: Register a webhook callback URL
      description: Registers a callback URL that will be called when a new email is received by a proxy binding that has a callback URL set.
      operationId: addCallback
      responses:
        '200':
          $ref: '#/components/responses/CallbackCreatedResponse'
      security:
        - api_auth:
            - default

  /api/v1/callback/get/{hash}:
    get:
      parameters:
        - name: hash
          in: path
          description: Hash identifier of the callback to retrieve
          required: true
          schema:
            type: string
      tags:
        - callback
      summary: Retrieve callback payload by hash
      description: Returns the payload received by a registered callback, including processing status and any data sent to the callback URL.
      responses:
        '200':
          $ref: '#/components/responses/CallbackPayloadResponse'
      security:
        - api_key:
            - default

  /api/v1/received-emails-links/{proxyBindingId}:
    get:
      parameters:
        - name: proxyBindingId
          in: path
          description: ID of the proxy binding whose received emails to list
          required: true
          schema:
            type: string
      tags:
        - received-email
      summary: Get received emails list by proxy email (last 55)
      description: Returns a list of the most recent 55 received-email link objects for the given proxy binding. The proxy binding must have is_browsable set to true.
      responses:
        '200':
          $ref: '#/components/responses/ReceivedEmailLinksResponse'
      security:
        - api_key:
            - default

  /api/v1/received-emails/{receivedEmailId}:
    get:
      parameters:
        - name: receivedEmailId
          in: path
          description: ID of the received email to retrieve
          required: true
          schema:
            type: string
      tags:
        - received-email
      summary: Get content of received email by id
      description: Returns the full message payload of a specific received email, including headers, body (HTML and plain-text), and attachments.
      responses:
        '200':
          $ref: '#/components/responses/ReceivedEmailDetailsResponse'
      security:
        - api_key:
            - default

  /api/v1/proxy-bindings:
    get:
      tags:
        - proxy-binding
      summary: List proxy email bindings
      description: Returns all proxy-email bindings for the authenticated user, along with account quota metadata (used and available proxy bindings).
      responses:
        '200':
          $ref: '#/components/responses/ProxyBindingListResponse'
      security:
        - api_key:
            - default
    post:
      tags:
        - proxy-binding
      summary: Create a proxy email binding
      description: Creates a new proxy-email binding. Specify the desired proxy address, one or more real addresses to forward to, and optionally a callback URL and browsable flag.
      operationId: addProxyBinding
      responses:
        '201':
          $ref: '#/components/responses/ProxyBindingResponse'
        '401':
          description: "Unauthorized — invalid or missing API token"
          $ref: '#/components/responses/ErrorResponse'
      security:
        - api_key:
            - default
      requestBody:
        $ref: '#/components/requestBodies/ProxyBindingCreateRequest'

  /api/v1/proxy-bindings/{id}:
    patch:
      parameters:
        - name: id
          in: path
          description: ID of the proxy-email binding to update
          required: true
          schema:
            type: string
      tags:
        - proxy-binding
      summary: Update a proxy email binding
      description: Updates an existing proxy-email binding. real_addresses is a map of address string to boolean (true = add/enable, false = disable). Other attributes such as description and callback_url can also be updated.
      operationId: patchProxyBinding
      responses:
        '200':
          $ref: '#/components/responses/ProxyBindingResponse'
        '401':
          description: "Unauthorized — invalid or missing API token"
          $ref: '#/components/responses/ErrorResponse'
      security:
        - api_key:
            - default
      requestBody:
        $ref: '#/components/requestBodies/ProxyBindingUpdateRequest'
    delete:
      parameters:
        - name: id
          in: path
          description: ID of the proxy-email binding to delete
          required: true
          schema:
            type: string
      tags:
        - proxy-binding
      summary: Delete a proxy email binding
      description: Permanently deletes the specified proxy-email binding. Incoming mail to the proxy address will no longer be forwarded.
      operationId: deleteProxyBinding
      responses:
        '200':
          description: Proxy email binding deleted successfully
        '401':
          description: "Unauthorized — invalid or missing API token"
          $ref: '#/components/responses/ErrorResponse'
      security:
        - api_key:
            - default

  /api/v1/api-token:
    get:
      tags:
        - api
      summary: Get API token
      description: Returns the long-lived API token for the authenticated user. Authenticate this request using the Bearer token obtained from POST /api/v1/auth. Use the returned token in the Token header for all subsequent requests.
      responses:
        '200':
          $ref: '#/components/responses/ApiTokenResponse'
      security:
        - api_auth:
            - default

  /api/v1/auth:
    post:
      tags:
        - user
      summary: Authenticate and obtain a Bearer token
      description: Authenticates with username and password and returns a short-lived OAuth Bearer token. Use this token to call GET /api/v1/api-token to obtain the long-lived API token.
      operationId: userAuth
      responses:
        '200':
          $ref: '#/components/responses/OauthTokenResponse'
        '401':
          description: Invalid username or password
          $ref: '#/components/responses/ErrorResponse'
      requestBody:
        $ref: '#/components/requestBodies/AuthRequest'

externalDocs:
  description: Find out more about Swagger
  url: http://swagger.io

components:

  schemas:

    OauthAccessToken:
      description: OAuth Bearer token issued after successful authentication, used to obtain the long-lived API token via GET /api/v1/api-token.
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              enum:
                - oauth-access-tokens
            id:
              type: string
            attributes:
              type: object
              properties:
                token:
                  type: string
                expires_at:
                  type: string
                2fa_granted:
                  type: integer
                  format: int32
                isNewAcc:
                  type: boolean
            relationships:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    data:
                      type: object
                      properties:
                        type:
                          type: string
                        id:
                          type: string

    ProxyBinding:
      description: A single proxy-email binding entity representing one proxy address that forwards incoming mail to one or more real addresses.
      properties:
        type:
          type: string
          enum:
            - proxy_bindings
        id:
          type: string
        attributes:
          type: object
          properties:
            real_addresses:
              type: object
              description: Map of real email address to its forwarding configuration.
              additionalProperties:
                type: object
                properties:
                  is_enabled:
                    type: boolean
                  is_verification_needed:
                    type: boolean
                  is_verified:
                    type: boolean
            proxy_address:
              type: string
            is_browsable:
              type: boolean
              description: Whether received emails can be retrieved via the API.
            received_emails:
              type: integer
              format: int32
            description:
              type: string
            callback_url:
              type: string
            created_at:
              type: string
            updated_at:
              type: string
        relationships:
          type: object
          properties:
            user:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    id:
                      type: string

    ProxyBindingCreate:
      description: Request body for creating a new proxy-email binding.
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              enum:
                - "proxy_bindings"
            attributes:
              type: object
              properties:
                real_addresses:
                  type: array
                  description: List of real email addresses to forward incoming mail to.
                  items:
                    type: string
                proxy_address:
                  type: string
                  description: The desired proxy email address (e.g. "alias@proxiedmail.com").
                is_browsable:
                  type: boolean
                  description: Whether received emails should be retrievable via the API.
                callback_url:
                  type: string
                  description: Optional URL to POST to when a new email is received.

    ProxyBindingUpdate:
      description: Request body for partially updating an existing proxy-email binding. real_addresses values are booleans — true to add or enable an address, false to disable it.
      properties:
        data:
          type: object
          properties:
            id:
              type: string
              description: ID of the proxy-email binding being updated.
            type:
              type: string
              enum:
                - "proxy_bindings"
            attributes:
              type: object
              properties:
                real_addresses:
                  type: object
                  description: Map of real email address to boolean — true to add/enable, false to disable.
                  additionalProperties:
                    type: boolean
                proxy_address:
                  type: string
                description:
                  type: string
                callback_url:
                  type: string
                received_emails:
                  type: integer
                  format: int32

    CallbackCreated:
      description: Confirmation payload returned when a callback URL is successfully registered.
      properties:
        status:
          type: string
        call_url:
          type: string
        get_url:
          type: string
        id:
          type: string

    AuthCredentials:
      description: User credentials payload for the authentication endpoint.
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              enum:
                - "auth-request"
            attributes:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string

    CallbackPayload:
      description: Payload stored for a registered callback, including processing status and any data received.
      properties:
        status:
          type: string
        payload:
          type: object
          nullable: true
        code:
          type: string
        is_received:
          type: boolean
        method:
          type: string
          nullable: true

  responses:

    ErrorResponse:
      description: "API error response — message and exception details are included in the body."
      content:
        application/json:
          schema:
            type: array
            items:
              properties:
                data:
                  type: object
                  properties:
                    id:
                      type: string
                    type:
                      type: string
                    attributes:
                      type: object
                      properties:
                        message:
                          type: string
                        exception:
                          type: string
                        file:
                          type: string
                        line:
                          type: integer
                          format: int32

    ReceivedEmailLinksResponse:
      description: "List of link objects for received emails associated with a proxy binding (up to the last 55)."
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    id:
                      type: string
                    attributes:
                      type: object
                      properties:
                        recipient_email:
                          type: string
                        sender_email:
                          type: string
                        subject:
                          type: string
                        attachmentsCounter:
                          type: integer
                          format: int32
                        link:
                          type: string
                          description: Relative path to the full email details endpoint.
                        is_processed:
                          type: boolean
                        created_at:
                          type: string
                        updated_at:
                          type: string

    ReceivedEmailDetailsResponse:
      description: "Full message payload of a specific received email, including headers, HTML and plain-text body, and attachments."
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  type:
                    type: string
                  id:
                    type: string
                  attributes:
                    type: object
                    properties:
                      recipient_email:
                        type: string
                      sender_email:
                        type: string
                      payload:
                        type: object
                        properties:
                          To:
                            type: string
                          From:
                            type: string
                          Subject:
                            type: string
                          recipient:
                            type: string
                          sender:
                            type: string
                          body-html:
                            type: string
                          body-plain:
                            type: string
                          attachments:
                            type: string
                            nullable: true
                      attachments:
                        type: array
                        items:
                          type: object
                          properties:
                            url:
                              type: string
                      is_processed:
                        type: boolean
                      created_at:
                        type: string
                      updated_at:
                        type: string

    CallbackCreatedResponse:
      description: "Callback registration confirmation containing the webhook call URL and the retrieval URL."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CallbackCreated'

    ProxyBindingListResponse:
      description: "Paginated list of proxy-email bindings with account quota metadata (used and available slots)."
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                type: object
                properties:
                  usedProxyBindings:
                    type: integer
                    format: int32
                  availableProxyBindings:
                    type: integer
                    format: int32
                  isVerificationEmailSend:
                    type: boolean
              data:
                type: array
                items:
                  $ref: '#/components/schemas/ProxyBinding'

    ApiTokenResponse:
      description: "Long-lived API token for use in the Token request header for all subsequent API calls."
      content:
        application/json:
          schema:
            type: object
            properties:
              token:
                type: string

    ProxyBindingResponse:
      description: "Single proxy-email binding returned after a successful create or update operation, with associated metadata."
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                type: object
                properties:
                  isVerificationEmailSend:
                    type: boolean
                  firstProxyBinding:
                    type: boolean
              data:
                $ref: '#/components/schemas/ProxyBinding'

    CallbackPayloadResponse:
      description: "Callback entry including its processing status and the payload data received at the callback URL."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CallbackPayload'

    OauthTokenResponse:
      description: "OAuth Bearer token issued upon successful authentication. Pass this in the Authorization header to call GET /api/v1/api-token."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OauthAccessToken'

  requestBodies:

    ProxyBindingCreateRequest:
      description: Payload for creating a new proxy-email binding.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProxyBindingCreate'

    AuthRequest:
      description: User credentials for authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthCredentials'

    ProxyBindingUpdateRequest:
      description: Payload for partially updating an existing proxy-email binding. real_addresses values are booleans (true = add/enable, false = disable).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProxyBindingUpdate'

  securitySchemes:
    api_auth:
      type: http
      scheme: bearer
    api_key:
      type: apiKey
      name: Token
      in: header
